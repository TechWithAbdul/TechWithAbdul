<svg width="1200" height="440" viewBox="0 0 1200 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A10"/>
      <stop offset="55%" stop-color="#121018"/>
      <stop offset="100%" stop-color="#0A0A10"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8A7B4E"/>
      <stop offset="50%" stop-color="#E8D5A8"/>
      <stop offset="100%" stop-color="#8A7B4E"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#3A2E5C" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0A0A10" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="440" fill="url(#bgGrad)"/>
  <rect width="1200" height="440" fill="url(#glow)"/>

  <!-- corner ornaments -->
  <g stroke="#8A7B4E" stroke-width="1" opacity="0.6">
    <line x1="60" y1="60" x2="60" y2="110"/>
    <line x1="60" y1="60" x2="110" y2="60"/>
    <line x1="1140" y1="60" x2="1140" y2="110"/>
    <line x1="1140" y1="60" x2="1090" y2="60"/>
    <line x1="60" y1="380" x2="60" y2="330"/>
    <line x1="60" y1="380" x2="110" y2="380"/>
    <line x1="1140" y1="380" x2="1140" y2="330"/>
    <line x1="1140" y1="380" x2="1090" y2="380"/>
  </g>

  <!-- subtle dot constellation -->
  <g fill="#9D8CD6" opacity="0.5">
    <circle cx="150" cy="150" r="2"/>
    <circle cx="185" cy="120" r="1.5"/>
    <circle cx="1050" cy="150" r="2"/>
    <circle cx="1015" cy="120" r="1.5"/>
    <circle cx="140" cy="290" r="1.5"/>
    <circle cx="1060" cy="290" r="1.5"/>
  </g>

  <!-- top rule -->
  <line x1="440" y1="150" x2="760" y2="150" stroke="url(#goldGrad)" stroke-width="1"/>
  <rect x="596" y="146" width="8" height="8" transform="rotate(45 600 150)" fill="#E8D5A8"/>

  <text x="600" y="152" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="14" letter-spacing="6" fill="#8A7B4E"> </text>

  <!-- name -->
  <text x="600" y="245" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="76" letter-spacing="4" fill="#F1EDE4">Abdul Rehman</text>

  <!-- subtitle -->
  <text x="600" y="295" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" letter-spacing="5" fill="#C9A961">SOFTWARE ENGINEER  ·  AI / ML ENGINEER  ·  FULL-STACK DEVELOPER</text>

  <!-- bottom rule -->
  <line x1="440" y1="330" x2="760" y2="330" stroke="url(#goldGrad)" stroke-width="1"/>
  <rect x="596" y="326" width="8" height="8" transform="rotate(45 600 330)" fill="#E8D5A8"/>

  <text x="600" y="370" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" letter-spacing="3" fill="#6E6C78">FINAL-YEAR COMPUTER SCIENCE  ·  PUNJAB, PAKISTAN</text>
</svg>
