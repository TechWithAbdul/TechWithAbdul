<svg width="1200" height="620" viewBox="0 0 1200 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#241f38" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0A0A10" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F1E4C0"/>
      <stop offset="60%" stop-color="#C9A961"/>
      <stop offset="100%" stop-color="#8A7B4E"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="620" fill="#0A0A10"/>
  <rect width="1200" height="620" fill="url(#bgGlow)"/>

  <!-- faint background stars -->
  <g fill="#EDEAE3">
    <circle cx="90" cy="60" r="1" opacity="0.4"/>
    <circle cx="1120" cy="90" r="1.2" opacity="0.5"/>
    <circle cx="70" cy="540" r="1" opacity="0.4"/>
    <circle cx="1140" cy="560" r="1.2" opacity="0.4"/>
    <circle cx="200" cy="580" r="1" opacity="0.3"/>
    <circle cx="1000" cy="580" r="1" opacity="0.3"/>
  </g>

  <text x="600" y="34" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" letter-spacing="5" fill="#8A7B4E">CORE EXPERTISE</text>

  <!-- connecting lines -->
  <g stroke="#5B4F80" stroke-width="1" opacity="0.5">
    <line x1="600" y1="310" x2="600.0" y2="80.0"/>
    <line x1="600" y1="310" x2="715.0" y2="110.8"/>
    <line x1="600" y1="310" x2="799.2" y2="195.0"/>
    <line x1="600" y1="310" x2="830.0" y2="310.0"/>
    <line x1="600" y1="310" x2="799.2" y2="425.0"/>
    <line x1="600" y1="310" x2="715.0" y2="509.2"/>
    <line x1="600" y1="310" x2="600.0" y2="540.0"/>
    <line x1="600" y1="310" x2="485.0" y2="509.2"/>
    <line x1="600" y1="310" x2="400.8" y2="425.0"/>
    <line x1="600" y1="310" x2="370.0" y2="310.0"/>
    <line x1="600" y1="310" x2="400.8" y2="195.0"/>
    <line x1="600" y1="310" x2="485.0" y2="110.8"/>
  </g>

  <!-- orbit ring -->
  <circle cx="600" cy="310" r="230" fill="none" stroke="#5B4F80" stroke-width="1" opacity="0.35"/>

  <!-- core node -->
  <circle cx="600" cy="310" r="34" fill="url(#coreGlow)"/>
  <text x="600" y="304" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#0A0A10" font-weight="bold">ABDUL</text>
  <text x="600" y="320" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#0A0A10" font-weight="bold">REHMAN</text>

  <!-- skill nodes -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#EDEAE3">

    <circle cx="600.0" cy="80.0" r="6" fill="#E8D5A8"><animate attributeName="opacity" values="1;0.35;1" dur="3s" begin="0.00s" repeatCount="indefinite"/></circle>
    <text x="600.0" y="42" text-anchor="middle">Python</text>

    <circle cx="715.0" cy="110.8" r="6" fill="#9D8CD6"><animate attributeName="opacity" values="1;0.35;1" dur="3s" begin="0.35s" repeatCount="indefinite"/></circle>
    <text x="732.0" y="85" text-anchor="start">C / C++</text>

    <circle cx="799.2" cy="195.0" r="6" fill="#9D8CD6"><animate attributeName="opacity" values="1;0.35;1" dur="3s" begin="0.70s" repeatCount="indefinite"/></circle>
    <text x="828.6" y="182" text-anchor="start">JavaScript · TS</text>

    <circle cx="830.0" cy="310.0" r="6" fill="#E8D5A8"><animate attributeName="opacity" values="1;0.35;1" dur="3s" begin="1.05s" repeatCount="indefinite"/></circle>
    <text x="864.0" y="315" text-anchor="start">React</text>

    <circle cx="799.2" cy="425.0" r="6" fill="#E8D5A8"><animate attributeName="opacity" values="1;0.35;1" dur="3s" begin="1.40s" repeatCount="indefinite"/></circle>
    <text x="828.6" y="446" text-anchor="start">Vite</text>

    <circle cx="715.0" cy="509.2" r="6" fill="#E8D5A8"><animate attributeName="opacity" values="1;0.35;1" dur="3s" begin="1.75s" repeatCount="indefinite"/></circle>
    <text x="732.0" y="542" text-anchor="start">FastAPI</text>

    <circle cx="600.0" cy="540.0" r="6" fill="#E8D5A8"><animate attributeName="opacity" values="1;0.35;1" dur="3s" begin="2.10s" repeatCount="indefinite"/></circle>
    <text x="600.0" y="578" text-anchor="middle">Node.js</text>

    <circle cx="485.0" cy="509.2" r="6" fill="#9D8CD6"><animate attributeName="opacity" values="1;0.35;1" dur="3s" begin="2.45s" repeatCount="indefinite"/></circle>
    <text x="468.0" y="542" text-anchor="end">MongoDB</text>

    <circle cx="400.8" cy="425.0" r="6" fill="#9D8CD6"><animate attributeName="opacity" values="1;0.35;1" dur="3s" begin="2.80s" repeatCount="indefinite"/></circle>
    <text x="371.4" y="446" text-anchor="end">PyTorch</text>

    <circle cx="370.0" cy="310.0" r="6" fill="#9D8CD6"><animate attributeName="opacity" values="1;0.35;1" dur="3s" begin="0.15s" repeatCount="indefinite"/></circle>
    <text x="336.0" y="315" text-anchor="end">TensorFlow</text>

    <circle cx="400.8" cy="195.0" r="6" fill="#9D8CD6"><animate attributeName="opacity" values="1;0.35;1" dur="3s" begin="0.50s" repeatCount="indefinite"/></circle>
    <text x="371.4" y="182" text-anchor="end">LangChain</text>

    <circle cx="485.0" cy="110.8" r="6" fill="#E8D5A8"><animate attributeName="opacity" values="1;0.35;1" dur="3s" begin="0.85s" repeatCount="indefinite"/></circle>
    <text x="468.0" y="85" text-anchor="end">Git · GitHub</text>

  </g>
</svg>
